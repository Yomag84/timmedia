<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2d5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4480;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGradient)" stroke="#f59e0b" stroke-width="2"/>

  <!-- Accent circle highlight -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.3"/>

  <!-- Main letter "T" -->
  <text x="100" y="115" font-family="Plus Jakarta Sans, sans-serif" font-size="70" font-weight="900" text-anchor="middle" fill="white">T</text>

  <!-- Accent bar under T -->
  <rect x="60" y="135" width="80" height="4" fill="url(#accentGradient)" rx="2"/>

  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="150" cy="50" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="160" cy="100" r="2.5" fill="#f59e0b" opacity="0.4"/>
  <circle cx="40" cy="100" r="2.5" fill="#f59e0b" opacity="0.4"/>
  <circle cx="145" cy="155" r="3" fill="#f59e0b" opacity="0.5"/>
  <circle cx="55" cy="155" r="3" fill="#f59e0b" opacity="0.5"/>
</svg>
